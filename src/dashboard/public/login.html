<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Dashboard Login</title>
  <style>
    :root{
      --bg:#0b0e14;--surface:#11161e;--card:#181e28;--border:#262d3a;
      --text:#e2e8f0;--muted:#7a8494;--primary:#6366f1;--danger:#ef4444;
      --radius:12px;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    .wrap{width:min(420px,92vw)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 20px}
    h1{font-size:18px;margin:0 0 6px 0}
    p{margin:0 0 16px 0;color:var(--muted);font-size:13px;line-height:1.35}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}
    input{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none}
    input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
    button{width:100%;margin-top:14px;padding:11px 12px;border-radius:10px;border:1px solid rgba(99,102,241,.25);background:rgba(99,102,241,.15);color:var(--text);cursor:pointer;font-weight:600}
    button:hover{background:rgba(99,102,241,.22)}
    .err{display:none;margin-top:12px;border:1px solid rgba(239,68,68,.35);background:rgba(239,68,68,.10);color:#fecaca;padding:10px 12px;border-radius:10px;font-size:13px}
    .footer{margin-top:10px;color:var(--muted);font-size:12px;text-align:center}
    code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Dashboard Login</h1>
      <p>Enter the dashboard password to continue.</p>
      <form id="f">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button id="btn" type="submit">Sign in</button>
        <div id="err" class="err"></div>
      </form>
    </div>
    <div class="footer">Tip: password is configured in <code>.env</code> as <code>DASHBOARD_PASSWORD</code>.</div>
  </div>
  <script>
    const f=document.getElementById('f');
    const btn=document.getElementById('btn');
    const err=document.getElementById('err');
    const pw=document.getElementById('password');
    function showErr(msg){err.textContent=msg;err.style.display='block';}
    f.addEventListener('submit', async (e)=>{
      e.preventDefault();
      err.style.display='none';
      btn.disabled=true;
      btn.textContent='Signing in...';
      try{
        const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw.value})});
        if(r.ok){ location.href='/'; return; }
        const j=await r.json().catch(()=>({error:'Login failed'}));
        showErr(j.error||'Login failed');
      }catch{
        showErr('Network error');
      }finally{
        btn.disabled=false;
        btn.textContent='Sign in';
      }
    });
  </script>
</body>
</html>
